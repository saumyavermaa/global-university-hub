<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global University Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Global University Hub</h1>
        <div class="controls">
            <input type="text" id="countryInput" placeholder="Enter country (e.g., India, USA)...">
            <button id="searchBtn">Search</button>
            <select id="sortOrder">
                <option value="asc">Sort A-Z</option>
                <option value="desc">Sort Z-A</option>
            </select>
        </div>
    </header>

    <main id="universityContainer">
        <p class="status-msg">Search for a country to explore universities!</p>
    </main>

    <script src="script.js"></script>
</body>
</html>
